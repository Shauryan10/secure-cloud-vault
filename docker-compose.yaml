services:

  mysql:
    image: mysql:8.4
    container_name: secure-vault-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: secure_cloud_vault

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend

    container_name: secure-vault-api

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - mysql

volumes:
  mysql-data: