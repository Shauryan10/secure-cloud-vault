services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: secure-vault-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: secure_cloud_vault

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: secure-vault-api
    restart: always

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      mysql:
        condition: service_healthy

    # No volume mount in production — image is self-contained
    # Remove the --reload flag for production use

  # ── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: secure-vault-ui
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  mysql-data:
