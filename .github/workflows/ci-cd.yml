name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Backend unit tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          SECRET_KEY:      test-secret-key-for-ci
          DB_HOST:         localhost
          DB_PORT:         "3306"
          DB_USER:         root
          DB_PASSWORD:     root
          DB_NAME:         test_db
          AWS_ACCESS_KEY:  testing
          AWS_SECRET_KEY:  testing
          AWS_REGION:      us-east-1
          S3_BUCKET:       test-bucket
          SMTP_HOST:       smtp.gmail.com
          SMTP_PORT:       "587"
          SMTP_USER:       test@example.com
          SMTP_PASSWORD:   test
          SMTP_FROM:       test@example.com
        run: |
          pytest tests/ \
            --tb=short \
            --strict-markers \
            -v \
            --junit-xml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Frontend lint + build check
# ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build (production)
        run: npm run build
        working-directory: frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build Docker images
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Hub secrets are set
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASS }}" ]; then
            echo "::error::DOCKER_PASS secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          echo "Secrets verified. Building images for: ${{ secrets.DOCKER_USERNAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       false
          tags:       ${{ secrets.DOCKER_USERNAME }}/secure-vault-backend:${{ github.sha }}
          outputs:    type=docker,dest=/tmp/backend.tar
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       false
          tags:       ${{ secrets.DOCKER_USERNAME }}/secure-vault-frontend:${{ github.sha }}
          outputs:    type=docker,dest=/tmp/frontend.tar
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/backend.tar
            /tmp/frontend.tar
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Trivy vulnerability scan
# ─────────────────────────────────────────────────────────────────────────────
  scan:
    name: Trivy — Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load images into Docker
        run: |
          docker load --input /tmp/backend.tar
          docker load --input /tmp/frontend.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ secrets.DOCKER_USERNAME }}/secure-vault-backend:${{ github.sha }}
          format:         table
          exit-code:      "1"
          ignore-unfixed: true
          severity:       CRITICAL,HIGH
          output:         trivy-backend.txt

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ secrets.DOCKER_USERNAME }}/secure-vault-frontend:${{ github.sha }}
          format:         table
          exit-code:      "1"
          ignore-unfixed: true
          severity:       CRITICAL,HIGH
          output:         trivy-frontend.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-backend.txt
            trivy-frontend.txt

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Push to Docker Hub  (only on push to main, not on PRs)
# ─────────────────────────────────────────────────────────────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/secure-vault-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/secure-vault-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/secure-vault-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/secure-vault-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Pipeline summary
        run: |
          echo "### Pipeline complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`latest\`, \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`latest\`, \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY